<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ========== CSS VARIABLES ========== */
:root {
  --bg: #f4f6f5;
  --surface: #ffffff;
  --text: #111827;
  --muted: #6b7280;
  --line: #e5e7eb;
  --brand: #0d9488;
  --brand2: #1d4ed8;
  --accent: #f97316;
  --soft: #f0fdfa;
  --shadow-sm: 0 2px 16px rgba(0,0,0,0.06);
  --shadow-md: 0 8px 32px rgba(0,0,0,0.10);
  --shadow-lg: 0 20px 56px rgba(0,0,0,0.14);
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Sora', sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 8% -6%, rgba(255,220,180,0.5), transparent 30%),
    radial-gradient(circle at 95% 0%, rgba(200,240,225,0.7), transparent 28%),
    var(--bg);
  overflow-x: hidden;
  line-height: 1.65;
}

.cursor {
  width: 20px;
  height: 20px;
  border: 2px solid var(--brand);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transition: transform 0.15s ease;
  mix-blend-mode: difference;
}
.cursor.hover { transform: scale(2); background: var(--brand); }

.bg-shapes {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
  overflow: hidden;
}
.bg-shape {
  position: absolute;
  opacity: 0.12;
  animation: float 20s infinite ease-in-out;
}
.bg-shape:nth-child(1) { width: 300px; height: 300px; background: var(--brand); border-radius: 50%; top: 10%; left: -5%; }
.bg-shape:nth-child(2) { width: 200px; height: 200px; background: var(--brand2); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; top: 60%; right: -3%; animation-delay: -5s; }
.bg-shape:nth-child(3) { width: 150px; height: 150px; background: var(--accent); border-radius: 50%; top: 30%; right: 20%; animation-delay: -10s; }
.bg-shape:nth-child(4) { width: 100px; height: 100px; background: var(--brand); border-radius: 50%; bottom: 20%; left: 30%; animation-delay: -15s; opacity: 0.08; }
@keyframes float {
  0%, 100% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(20px, -30px) rotate(5deg); }
  50% { transform: translate(-10px, 20px) rotate(-5deg); }
  75% { transform: translate(30px, 10px) rotate(3deg); }
}

.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--brand);
  border-radius: 50%;
  opacity: 0;
  animation: particle-float 8s infinite;
}
@keyframes particle-float {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.6; }
  90% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-100vh) scale(1); }
}

.theme-toggle { display: none; }
.container { width: min(1200px, 92vw); margin: 0 auto; }
a { text-decoration: none; color: inherit; cursor: none; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(244,246,245,0.88);
  backdrop-filter: blur(14px);
  border-bottom: 1px solid transparent;
  transition: all 0.3s ease;
}
header.scrolled { border-color: var(--line); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.nav { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
.logo { font-family: 'Sora', sans-serif; font-size: 1.35rem; font-weight: 800; letter-spacing: -0.5px; }
.logo span { color: var(--brand); }
.nav-links { list-style: none; display: flex; align-items: center; gap: 6px; }
.nav-links a {
  font-size: 0.875rem; color: var(--muted); font-weight: 600;
  padding: 0.4rem 0.85rem; border-radius: 8px;
  transition: all 0.2s ease;
}
.nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(13,148,136,0.08); }

.btn {
  border: 1px solid transparent; border-radius: 999px;
  font-family: 'Sora', sans-serif;
  font-size: 0.875rem; font-weight: 700;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 0.7rem 1.3rem;
  cursor: none;
  transition: all 0.3s ease;
}
.btn-primary {
  color: #fff;
  background: linear-gradient(130deg, var(--brand), var(--brand2));
  box-shadow: 0 6px 20px rgba(13,148,136,0.28);
}
.btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 12px 30px rgba(13,148,136,0.38); }
.btn-ghost { background: var(--surface); border-color: var(--line); color: var(--text); }
.btn-ghost:hover { transform: translateY(-1px); border-color: var(--brand); }

.hero { padding: 48px 0 0; position: relative; }
.hero-wrap {
  background: linear-gradient(150deg, #fffef9 0%, #f9f7f2 55%, #eef8f5 100%);
  border: 1px solid #e2e8e5;
  border-radius: 28px;
  box-shadow: var(--shadow-md);
  padding: clamp(24px, 4vw, 60px);
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 32px; overflow: hidden; position: relative;
}
.hero-wrap::before {
  content: ''; position: absolute;
  width: 240px; height: 240px; border-radius: 50%;
  right: -70px; top: -70px;
  background: radial-gradient(circle, rgba(13,148,136,0.2), transparent 65%);
  pointer-events: none;
  animation: pulse-glow 4s infinite ease-in-out;
}
@keyframes pulse-glow {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.2); opacity: 1; }
}
.hero-wrap::after {
  content: ''; position: absolute;
  width: 180px; height: 180px; border-radius: 50%;
  left: 30%; bottom: -60px;
  background: radial-gradient(circle, rgba(249,115,22,0.12), transparent 65%);
  pointer-events: none;
  animation: pulse-glow 5s infinite ease-in-out reverse;
}

.eyebrow {
  display: inline-flex; align-items: center; gap: 7px;
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 800;
  color: var(--brand); border: 1px solid #b2ded8;
  background: var(--soft); border-radius: 999px;
  padding: 0.3rem 0.75rem; margin-bottom: 14px;
}
.pulse { width: 7px; height: 7px; border-radius: 50%; background: var(--brand); animation: pulse 1.8s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.5} }

h1,h2,h3,h4 { font-family: 'Sora', sans-serif; line-height: 1.18; }
.hero h1 { font-size: clamp(2.2rem, 5vw, 4rem); font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
.name {
  background: linear-gradient(125deg, var(--brand), var(--brand2), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: gradient-shift 5s ease infinite;
  background-size: 200% 200%;
}
@keyframes gradient-shift {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}

.role { font-size: 1.1rem; color: var(--brand2); font-weight: 700; margin-bottom: 14px; letter-spacing: -0.3px; }
.hero p { font-size: 0.975rem; color: var(--muted); max-width: 52ch; margin-bottom: 20px; line-height: 1.75; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; }
.hero-metrics { display: flex; flex-wrap: wrap; gap: 20px; }
.hero-metrics strong { display: block; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
.hero-metrics span { font-size: 0.76rem; color: var(--muted); font-weight: 600; }
.counter { display: inline-block; transition: all 0.3s ease; }
.counter:hover { transform: scale(1.15); text-shadow: 0 0 20px var(--brand); }

.hero-side { display: flex; justify-content: center; align-items: flex-start; }
.profile-box {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 20px; width: min(300px, 100%);
  padding: 20px 18px; text-align: center;
  box-shadow: var(--shadow-md);
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.profile-box:hover { 
  transform: translateY(-15px) scale(1.03) rotateX(3deg); 
  box-shadow: 0 25px 50px rgba(13,148,136,0.25);
  border-color: var(--brand);
}
.profile-box:hover .profile-photo {
  border-color: var(--brand);
  box-shadow: 0 15px 40px rgba(13,148,136,0.35);
}
.profile-photo {
  width: 220px; height: 220px; margin: 0 auto;
  border-radius: 50%; overflow: hidden;
  border: 5px solid #c8e6df;
  box-shadow: 0 12px 32px rgba(13,148,136,0.22);
  position: relative;
}
.profile-photo::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  background: linear-gradient(45deg, var(--brand), var(--brand2), var(--accent));
  z-index: -1;
  animation: rotate-border 3s linear infinite;
}
@keyframes rotate-border { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.profile-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
.profile-box:hover .profile-photo img { transform: scale(1.15); }
.profile-box h4 { font-size: 1.05rem; font-weight: 800; margin-top: 12px; margin-bottom: 3px; letter-spacing: -0.3px; }
.profile-box p { color: var(--muted); font-size: 0.8rem; margin-bottom: 14px; }

.section { padding: 80px 0 0; }
.section-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 18px; margin-bottom: 24px; }
.section-head p { color: var(--muted); max-width: 55ch; font-size: 0.925rem; line-height: 1.7; }
.section h2 { font-size: clamp(1.65rem, 3vw, 2.4rem); font-weight: 800; letter-spacing: -1px; }

.card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  cursor: pointer;
}
.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--shadow-lg);
  border-color: var(--brand);
}

/* ========== SERVICES ========== */
.services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.service-card { padding: 22px 20px; position: relative; overflow: hidden; }
.service-card::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(13,148,136,0.08), rgba(29,78,216,0.06));
  opacity: 0; transition: opacity 0.3s;
  border-radius: var(--radius);
}
.service-card:hover { 
  transform: translateY(-12px) scale(1.03) rotateX(3deg); 
  box-shadow: var(--shadow-lg); 
  border-color: var(--brand); 
}
.service-card:hover::before { opacity: 1; }
.service-icon { font-size: 2rem; margin-bottom: 12px; display: block; transition: all 0.3s ease; }
.service-card:hover .service-icon { transform: scale(1.25) rotate(10deg); }
.service-card h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.3px; }
.service-card p { font-size: 0.875rem; color: var(--muted); line-height: 1.7; }

/* ========== WHY HIRE ========== */
.hire-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.hire-card { padding: 18px 16px; position: relative; overflow: hidden; }
.hire-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--brand), var(--brand2));
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.35s ease;
}
.hire-card:hover { 
  transform: translateY(-10px) scale(1.03) rotateY(5deg); 
  box-shadow: var(--shadow-lg); 
  border-color: var(--brand);
}
.hire-card:hover::after { transform: scaleX(1); }
.hire-card h3 { font-size: 0.97rem; font-weight: 800; margin-bottom: 7px; letter-spacing: -0.3px; }
.hire-card p { font-size: 0.84rem; color: var(--muted); line-height: 1.65; }

/* ========== SKILLS ========== */
.skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.skill-item { padding: 16px 20px; }
.skill-info { display: flex; justify-content: space-between; margin-bottom: 10px; }
.skill-name { font-weight: 700; font-size: 0.95rem; }
.skill-percent { font-weight: 800; color: var(--brand); }
.skill-bar { height: 8px; background: var(--line); border-radius: 999px; overflow: hidden; }
.skill-progress {
  height: 100%;
  background: linear-gradient(90deg, var(--brand), var(--brand2));
  border-radius: 999px;
  width: 0;
  transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.skill-progress::after {
  content: '';
  position: absolute;
  right: 0; top: 0;
  height: 100%; width: 30px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { transform: translateX(-30px); } 100% { transform: translateX(30px); } }

/* ========== PROJECTS SLIDER ========== */
.projects-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.project-card {
  overflow: hidden; position: relative;
  transform-style: preserve-3d;
  transition: all 0.4s ease;
  border-radius: var(--radius);
}
.project-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-lg);
}

/* Slider Container */
.project-slider {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  overflow: hidden;
  cursor: pointer;
  background: linear-gradient(140deg, #e5f2ec, #fff1e3);
}

.slider-images {
  display: flex;
  width: 300%;
  height: 100%;
  transition: transform 0.5s ease;
}

.project-slider:hover .slider-images {
  animation: sliderAutoPlay 3s infinite alternate;
}

@keyframes sliderAutoPlay {
  0% { transform: translateX(0); }
  50% { transform: translateX(-33.33%); }
  100% { transform: translateX(-66.66%); }
}

.slider-images img {
  width: 33.33%;
  height: 100%;
  object-fit: cover;
  flex-shrink: 0;
}

/* Slider Dots */
.slider-dots {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
  z-index: 3;
}

.slider-dots span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  transition: all 0.3s ease;
}

.slider-dots span.active {
  50% { transform: translateX(-33.33%); }
  100% { transform: translateX(-66.66%); }
}

.slider-images img {
  width: 33.33%;
